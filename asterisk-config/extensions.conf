[general]
static=yes
writeprotect=no
clearglobalvars=no

; ─── Internal extensions ───────────────────────────────────────────────────────

[internal]
exten => 1001,1,Dial(PJSIP/1001,30,tT)
 same => n,Hangup()

exten => 1002,1,Dial(PJSIP/1002,30,tT)
 same => n,Hangup()

; Echo test — dial 600 to verify audio path end-to-end
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; Conference bridge
exten => 2000,1,Answer()
 same => n,ConfBridge(2000,default_bridge,default_user)
 same => n,Hangup()

; Outbound PSTN — 10-digit (e.g. 8005551234) → sends +1XXXXXXXXXX to Twilio
exten => _XXXXXXXXXX,1,Set(CALLERID(num)=+18474168858)
 same => n,Dial(PJSIP/+1${EXTEN}@twilio-trunk,30,tT)
 same => n,Hangup()

; Outbound PSTN — 11-digit (e.g. 18005551234) → sends +1XXXXXXXXXX to Twilio
exten => _1XXXXXXXXXX,1,Set(CALLERID(num)=+18474168858)
 same => n,Dial(PJSIP/+${EXTEN}@twilio-trunk,30,tT)
 same => n,Hangup()

; ─── Inbound from Twilio trunk ─────────────────────────────────────────────────

[from-trunk]
; All inbound PSTN calls ring extension 1001
exten => s,1,Answer()
 same => n,Dial(PJSIP/1001,30,tT)
 same => n,Hangup()

exten => _X.,1,Answer()
 same => n,Dial(PJSIP/1001,30,tT)
 same => n,Hangup()
