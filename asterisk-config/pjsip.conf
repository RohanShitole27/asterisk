[global]
type=global
endpoint_identifier_order=auth_username,username,ip

; ─── WSS Transport — WebRTC browsers connect here ────────────────────────────
[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
cert_file=/etc/asterisk/certs/asterisk.crt
priv_key_file=/etc/asterisk/certs/asterisk.key
method=tlsv1_2

; ─── UDP Transport — Twilio trunk uses this ──────────────────────────────────
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ─── Extension 1001 (three stanzas, same name, different type=) ──────────────
; The aors=1001 field must match the section name of the type=aor stanza exactly.
; Using the same name for all three types is the standard PJSIP pattern.

[1001]
type=endpoint
transport=transport-wss
context=internal
disallow=all
allow=opus,ulaw,alaw
auth=1001
aors=1001
webrtc=yes
dtls_auto_generate_cert=no
use_avpf=yes
media_encryption=dtls
dtls_verify=no
dtls_setup=actpass
ice_support=yes
rtcp_mux=yes
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

[1001]
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=60

[1001]
type=auth
auth_type=userpass
username=1001
password=1234

; ─── Extension 1002 ───────────────────────────────────────────────────────────

[1002]
type=endpoint
transport=transport-wss
context=internal
disallow=all
allow=opus,ulaw,alaw
auth=1002
aors=1002
webrtc=yes
dtls_auto_generate_cert=no
use_avpf=yes
media_encryption=dtls
dtls_verify=no
dtls_setup=actpass
ice_support=yes
rtcp_mux=yes
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

[1002]
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=60

[1002]
type=auth
auth_type=userpass
username=1002
password=1234

; ─── Twilio Elastic SIP Trunk ─────────────────────────────────────────────────
; No registration stanza — Twilio does not support SIP REGISTER from Asterisk.
; Outbound: PJSIP/number@twilio-trunk in extensions.conf
; Inbound:  Twilio sends INVITE to Asterisk's public IP:5060
;
; SETUP REQUIRED:
;   1. In Twilio Console → Elastic SIP Trunking → your trunk → Authentication
;      → Credential Lists → create one, note the username and password.
;   2. Replace YOUR_TERMINATION_URI below with your trunk's Termination SIP URI
;      (looks like: yourname.pstn.twilio.com) from the Termination tab.
;   3. Replace YOUR_CRED_USERNAME and YOUR_CRED_PASSWORD below.

[twilio-outbound-auth]
type=auth
auth_type=userpass
username=rhn
password=Password@123


[twilio-trunk]
type=endpoint
transport=transport-udp
context=from-trunk
disallow=all
allow=ulaw
from_user=+18474168858
from_domain=voiplocal.pstn.twilio.com
aors=twilio-trunk
outbound_auth=twilio-outbound-auth
direct_media=no

[twilio-trunk]
type=aor
contact=sip:voiplocal.pstn.twilio.com

[twilio-trunk]
type=identify
endpoint=twilio-trunk
match=54.172.60.0/23
match=54.244.51.0/24
match=54.171.127.192/26
match=54.65.63.192/26
match=177.71.206.192/26



